            <form id="searchForm" onsubmit="handleSearch(event)" class="space-y-3">

                           class="w-full px-3 py-3 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">

                <button onclick="switchTab('recent')" id="tabBtnRecent" class="touch-target flex-1 pb-2 text-xs font-bold text-slate-400 border-b-2 border-transparent">
                    <i class="fa-solid fa-clock mr-1"></i> 최근 검색

            <!-- List Content -->
            <div id="listContainer" class="space-y-2 max-h-[180px] overflow-y-auto">
                <!-- Lists will be loaded dynamically -->
            </div>
        </div>

        <!-- Interactive Tracking Display Board -->
        <div id="displayBoard" class="space-y-4">
            <!-- Welcome Info default screen -->
            <div id="welcomeState" class="bg-white rounded-2xl border border-slate-100 p-8 text-center shadow-sm">
                <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-truck-loading text-xl"></i>
                </div>
                <h3 class="text-xs font-bold text-slate-800">조회대기</h3>
                <p class="text-[10px] text-slate-400 mt-1">상단의 폼에 송장번호 정보를 입력하면 실시간 위치 정보를 가져옵니다.</p>
            </div>

            <!-- Loading Tracker -->
            <div id="loadingState" class="bg-white rounded-2xl border border-slate-100 p-8 text-center shadow-sm hidden">
                <div class="w-10 h-10 border-4 border-slate-100 border-t-blue-500 rounded-full animate-spin mx-auto mb-3"></div>
                <h3 class="text-xs font-semibold text-slate-700">정보 수신 중...</h3>
            </div>

            <!-- Error Notification -->
            <div id="errorState" class="bg-white rounded-2xl border border-rose-100 p-6 text-center shadow-sm hidden">
                <div class="w-10 h-10 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-3">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <h3 class="text-xs font-bold text-slate-800" id="errorTitle">조회할 수 없음</h3>
                <p class="text-[10px] text-slate-400 mt-1" id="errorMessage">인증 정보가 올바르지 않거나 아직 택배사의 전산 처리가 시작되지 않았습니다.</p>
            </div>

            <!-- Tracking Output Cards -->
            <div id="resultState" class="hidden space-y-4">
                
                <!-- Info Summary Card -->
                <div class="bg-white rounded-2xl border border-slate-100 p-4 shadow-sm relative overflow-hidden">
                    <div class="absolute top-0 left-0 right-0 h-1 bg-blue-500"></div>
                    <div class="flex items-start justify-between mt-1">
                        <div>
                            <span id="resCourierName" class="text-[9px] font-bold px-2 py-0.5 bg-slate-100 text-slate-600 rounded-full">우체국택배</span>
                            <h3 id="resTrackingNum" class="text-md font-bold text-slate-900 mt-1">123456789012</h3>
                            <p id="resMemo" class="text-[10px] text-slate-400 mt-0.5">메모: -</p>
                        </div>
                        <div class="flex space-x-1">
                            <!-- Toggle Favorite -->
                            <button id="favoriteToggleBtn" onclick="toggleCurrentFavorite()" class="touch-target w-9 h-9 bg-slate-50 rounded-lg flex items-center justify-center">
                                <i id="favoriteIcon" class="fa-solid fa-star text-sm text-slate-300"></i>
                            </button>
                            <!-- Clipboard Link -->
                            <button onclick="copyTrackingNumber()" class="touch-target w-9 h-9 bg-slate-50 rounded-lg flex items-center justify-center">
                                <i class="fa-regular fa-copy text-sm text-slate-500"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Progress Meta Row -->
                    <div class="grid grid-cols-2 gap-2 mt-4 pt-3 border-t border-slate-50 text-[10px]">
                        <div>
                            <span class="text-slate-400 block font-semibold">배송 단계</span>
                            <span id="resStatusText" class="font-bold text-blue-600 text-xs">정보 검색 중</span>
                        </div>
                        <div class="text-right">
                            <span class="text-slate-400 block font-semibold">최근 확인</span>
                            <span id="resLastUpdate" class="text-slate-700 font-medium">--:--</span>
                        </div>
                    </div>
                </div>

                <!-- Mini Map-like Step Timeline -->
                <div class="bg-white rounded-2xl border border-slate-100 p-4 shadow-sm">
                    <div class="flex items-center justify-between text-center relative">
                        <div class="absolute left-4 right-4 top-4 h-0.5 bg-slate-100 z-0"></div>
                        <div id="progressActiveLine" class="absolute left-4 top-4 h-0.5 bg-blue-500 z-0 transition-all duration-300" style="width: 0%;"></div>

                        <div class="z-10 flex-1">
                            <div id="step1" class="w-8 h-8 rounded-full bg-slate-100 border-2 border-slate-200 text-slate-400 mx-auto flex items-center justify-center text-xs">
                                <i class="fa-solid fa-box-open"></i>
                            </div>
                            <span class="text-[9px] mt-1 block text-slate-400" id="lbl1">집화</span>

                        <div class="z-10 flex-1">
                            <div id="step2" class="w-8 h-8 rounded-full bg-slate-100 border-2 border-slate-200 text-slate-400 mx-auto flex items-center justify-center text-xs">
                                <i class="fa-solid fa-truck"></i>
                            </div>
                            <span class="text-[9px] mt-1 block text-slate-400" id="lbl2">이동</span>
                        </div>
                        <div class="z-10 flex-1">
                            <div id="step3" class="w-8 h-8 rounded-full bg-slate-100 border-2 border-slate-200 text-slate-400 mx-auto flex items-center justify-center text-xs">
                                <i class="fa-solid fa-motorcycle"></i>
                            </div>
                            <span class="text-[9px] mt-1 block text-slate-400" id="lbl3">출발</span>

                            <div id="step4" class="w-8 h-8 rounded-full bg-slate-100 border-2 border-slate-200 text-slate-400 mx-auto flex items-center justify-center text-xs">
                                <i class="fa-solid fa-house"></i>

                            <span class="text-[9px] mt-1 block text-slate-400" id="lbl4">완료</span>
                        </div>
                    </div>
                </div>

                <!-- Mini Timeline History -->
                <div class="bg-white rounded-2xl border border-slate-100 p-4 shadow-sm">
                    <h4 class="text-xs font-bold text-slate-800 mb-3">배송 상세 이력</h4>
                    <div id="timeline" class="relative pl-4 border-l-2 border-slate-100 space-y-4 text-xs">
                        <!-- Dynamic items -->
                    </div>

            </div>
        </div>

    </main>

    <!-- Modal Configuration (인증 키 설정) -->
    <div id="credentialsModal" class="fixed inset-0 z-50 overflow-y-auto hidden" role="dialog" aria-modal="true">
        <div class="flex items-center justify-center min-h-screen p-4 text-center">
            <div onclick="toggleCredentialsModal()" class="fixed inset-0 bg-slate-950 bg-opacity-40 transition-opacity"></div>

            <div class="inline-block bg-white rounded-2xl text-left overflow-hidden shadow-xl transform transition-all w-full max-w-xs border border-slate-100">
                <div class="bg-white p-5">
                    <h3 class="text-sm font-bold text-slate-900 border-b border-slate-50 pb-2">
                        <i class="fa-solid fa-sliders text-blue-500 mr-1.5"></i>API Key 설정
                    </h3>
                    <div class="space-y-3 mt-3">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-1">API Key</label>
                            <input type="text" id="apiKeyInput" placeholder="pk_live_..." 
                                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-mono">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-1">Secret Key</label>
                            <input type="password" id="secretKeyInput" placeholder="sk_live_..." 
                                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-mono">
                        </div>
                        <button onclick="useDemoKeys()" class="text-[9px] text-blue-500 font-semibold block underline">
                            데모 키 적용하기
                        </button>
                    </div>
                </div>
                <div class="bg-slate-50 p-4 flex items-center justify-end space-x-1.5">
                    <button onclick="toggleCredentialsModal()" class="px-3 py-1.5 text-xs text-slate-500 bg-white border rounded-lg">닫기</button>
                    <button onclick="saveCredentials()" class="px-3 py-1.5 text-xs text-white bg-blue-600 rounded-lg">저장</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Toast -->
    <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white text-[11px] font-semibold px-4 py-2.5 rounded-full shadow-lg flex items-center space-x-1.5 opacity-0 transform translate-y-10 transition-all duration-300 pointer-events-none">
        <i class="fa-solid fa-info-circle text-blue-400"></i>
        <span id="toastMessage">-</span>
    </div>

    <!-- Script Implementation -->
    <script>
        const DEMO_API_KEY = "pk_demo_002_do_not_use_in_production";
        const DEMO_SECRET_KEY = "sk_demo_002_do_not_use_in_production";

        let activeTab = 'favorites';
        let currentSearchData = null;
        let currentCourier = '';
        let currentTracking = '';
        let currentMemo = '';

        window.addEventListener('DOMContentLoaded', () => {
            initCredentials();
            renderList();
        });

        function initCredentials() {
            let api = localStorage.getItem('delivery_api_key');
            let sec = localStorage.getItem('delivery_secret_key');
            if (!api || !sec) {
                api = DEMO_API_KEY;
                sec = DEMO_SECRET_KEY;
                localStorage.setItem('delivery_api_key', api);
                localStorage.setItem('delivery_secret_key', sec);
            }
            document.getElementById('apiKeyInput').value = api;
            document.getElementById('secretKeyInput').value = sec;
        }

        function saveCredentials() {
            const api = document.getElementById('apiKeyInput').value.trim();
            const sec = document.getElementById('secretKeyInput').value.trim();
            if (!api || !sec) {
                showToast("키 값을 채워주세요.");
                return;
            }
            localStorage.setItem('delivery_api_key', api);
            localStorage.setItem('delivery_secret_key', sec);
            showToast("설정이 저장되었습니다.");
            toggleCredentialsModal();
        }

        function useDemoKeys() {
            document.getElementById('apiKeyInput').value = DEMO_API_KEY;
            document.getElementById('secretKeyInput').value = DEMO_SECRET_KEY;
            showToast("데모 키가 입력되었습니다.");
        }

        function toggleCredentialsModal() {
            document.getElementById('credentialsModal').classList.toggle('hidden');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = message;
            toast.classList.remove('opacity-0', 'translate-y-10');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-10');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 2500);
        }

        function switchTab(tab) {
            activeTab = tab;
            const favBtn = document.getElementById('tabBtnFavorites');
            const recBtn = document.getElementById('tabBtnRecent');
            
            if (tab === 'favorites') {
                favBtn.className = "touch-target flex-1 pb-2 text-xs font-bold text-blue-600 border-b-2 border-blue-600";
                recBtn.className = "touch-target flex-1 pb-2 text-xs font-bold text-slate-400 border-b-2 border-transparent";
            } else {
                recBtn.className = "touch-target flex-1 pb-2 text-xs font-bold text-blue-600 border-b-2 border-blue-600";
                favBtn.className = "touch-target flex-1 pb-2 text-xs font-bold text-slate-400 border-b-2 border-transparent";
            }
            renderList();
        }

        async function handleSearch(e) {
            if (e) e.preventDefault();
            const cr = document.getElementById('courierSelect').value;
            const tr = document.getElementById('trackingNumberInput').value.trim().replace(/-/g, "");
            const mm = document.getElementById('memoInput').value.trim();

            if (!tr) {
                showToast("운송장 번호를 입력하세요.");
                return;
            }
            await performTracking(cr, tr, mm);
        }

        async function performTracking(courier, tracking, memo) {
            // Show Spinner
            document.getElementById('welcomeState').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('errorState').classList.add('hidden');
            document.getElementById('resultState').classList.add('hidden');

            const api = localStorage.getItem('delivery_api_key') || DEMO_API_KEY;
            const sec = localStorage.getItem('delivery_secret_key') || DEMO_SECRET_KEY;

            try {
                const response = await fetch("https://api.deliveryapi.co.kr/v1/tracking/trace", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${api}:${sec}`
                    },
                    body: JSON.stringify({ items: [{ courierCode: courier, trackingNumber: tracking }] })
                });

                const res = await response.json();
                document.getElementById('loadingState').classList.add('hidden');

                if (res.isSuccess && res.data?.results?.[0]?.success) {
                    const trackingData = res.data.results[0].data;
                    displayResult(trackingData, memo);
                    saveRecent(courier, tracking, trackingData.courierName, trackingData.deliveryStatusText, memo);
                } else {
                    const failMsg = res.data?.results?.[0]?.error || "송장이 아직 등록되지 않았습니다.";
                    showError(failMsg);
                }
            } catch (err) {
                document.getElementById('loadingState').classList.add('hidden');
                showError("서버와의 통신 도중 에러가 발생했습니다.");
            }
        }

        function showError(msg) {
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').innerText = msg;
        }

        function displayResult(data, memo) {
            document.getElementById('resultState').classList.remove('hidden');

            currentSearchData = data;
            currentCourier = data.courierCode;
            currentTracking = data.trackingNumber;
            currentMemo = memo;

            document.getElementById('resCourierName').innerText = data.courierName;
            document.getElementById('resTrackingNum').innerText = data.trackingNumber;
            document.getElementById('resMemo').innerText = memo ? `메모: ${memo}` : '메모: -';
            document.getElementById('resStatusText').innerText = data.deliveryStatusText || '배송중';
            document.getElementById('resLastUpdate').innerText = data.dateLastProgress ? data.dateLastProgress.split('T')[1]?.substring(0, 5) || '--:--' : '--:--';

            // Update Progress UI
            updateProgress(data.deliveryStatus);
            
            // Build Timeline
            const tl = document.getElementById('timeline');
            tl.innerHTML = '';
            
            const history = data.progresses || [];
            if (history.length === 0) {
                tl.innerHTML = `<div class="text-slate-400 py-4 text-center">진행 데이터가 아직 없습니다.</div>`;
            } else {
                [...history].reverse().forEach((p, idx) => {
                    const isNew = idx === 0;
                    const dateObj = new Date(p.dateTime);
                    const timeStr = isNaN(dateObj.getTime()) ? '' : `${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')}`;
                    
                    const el = `
                        <div class="relative pb-1">
                            <div class="absolute -left-[21px] top-1 w-2.5 h-2.5 rounded-full border-2 ${isNew ? 'bg-blue-600 border-blue-100 ring-4 ring-blue-50' : 'bg-slate-300 border-white'} z-10"></div>
                            <div class="flex items-start justify-between gap-1.5">
                                <div class="flex-1">
                                    <span class="font-bold ${isNew ? 'text-blue-600' : 'text-slate-800'} text-[11px]">${p.status || '영업소'}</span>
                                    <span class="text-[9px] text-slate-400 block">${p.location || ''}</span>
                                    <p class="text-[10px] text-slate-500 mt-1 leading-normal">${p.description || ''}</p>
                                </div>
                                <span class="text-[9px] text-slate-400 font-mono mt-0.5">${timeStr}</span>
                            </div>
                        </div>
                    `;
                    tl.insertAdjacentHTML('beforeend', el);
                });
            }
            updateFavIcon();
        }

        function updateProgress(status) {
            const steps = [document.getElementById('step1'), document.getElementById('step2'), document.getElementById('step3'), document.getElementById('step4')];
            const labels = [document.getElementById('lbl1'), document.getElementById('lbl2'), document.getElementById('lbl3'), document.getElementById('lbl4')];
            const line = document.getElementById('progressActiveLine');

            steps.forEach((s, idx) => {
                s.className = "w-8 h-8 rounded-full bg-slate-50 border border-slate-200 text-slate-400 mx-auto flex items-center justify-center text-xs";
                labels[idx].className = "text-[9px] mt-1 block text-slate-400";
            });

            const act = "w-8 h-8 rounded-full bg-blue-50 border border-blue-500 text-blue-600 mx-auto flex items-center justify-center text-xs shadow-sm font-bold";
            const done = "w-8 h-8 rounded-full bg-blue-600 text-white mx-auto flex items-center justify-center text-xs";

            if (status === 'AT_PICKUP') {
                steps[0].className = act; labels[0].className = "text-[9px] mt-1 block text-blue-600 font-bold";
                line.style.width = '0%';
            } else if (status === 'IN_TRANSIT') {
                steps[0].className = done;
                steps[1].className = act; labels[1].className = "text-[9px] mt-1 block text-blue-600 font-bold";
                line.style.width = '33%';
            } else if (status === 'OUT_FOR_DELIVERY') {
                steps[0].className = done; steps[1].className = done;
                steps[2].className = act; labels[2].className = "text-[9px] mt-1 block text-blue-600 font-bold";
                line.style.width = '66%';
            } else if (status === 'DELIVERED') {
                steps[0].className = done; steps[1].className = done; steps[2].className = done;
                steps[3].className = done; labels[3].className = "text-[9px] mt-1 block text-blue-600 font-bold";
                line.style.width = '100%';
            }
        }

        // ----------------- STORAGE -----------------
        function getFavs() { return JSON.parse(localStorage.getItem('m_fav')) || []; }
        function getRecs() { return JSON.parse(localStorage.getItem('m_rec')) || []; }

        function toggleCurrentFavorite() {
            if (!currentSearchData) return;
            let favs = getFavs();
            const exist = favs.findIndex(f => f.courier === currentCourier && f.tracking === currentTracking);

            if (exist > -1) {
                favs.splice(exist, 1);
                showToast("즐겨찾기가 취소되었습니다.");
            } else {
                favs.push({
                    courier: currentCourier,
                    courierName: currentSearchData.courierName,
                    tracking: currentTracking,
                    statusText: currentSearchData.deliveryStatusText,
                    memo: currentMemo
                });
                showToast("즐겨찾기에 등록되었습니다.");
            }
            localStorage.setItem('m_fav', JSON.stringify(favs));
            updateFavIcon();
            if (activeTab === 'favorites') renderList();
        }

        function updateFavIcon() {
            const has = getFavs().some(f => f.courier === currentCourier && f.tracking === currentTracking);
            document.getElementById('favoriteIcon').className = has ? "fa-solid fa-star text-sm text-yellow-400" : "fa-regular fa-star text-sm text-slate-400";
        }

        function saveRecent(courier, tracking, courierName, statusText, memo) {
            let recs = getRecs().filter(r => !(r.courier === courier && r.tracking === tracking));
            recs.unshift({ courier, tracking, courierName, statusText, memo });
            if (recs.length > 10) recs.pop();
            localStorage.setItem('m_rec', JSON.stringify(recs));
            if (activeTab === 'recent') renderList();
        }

        function deleteItem(event, courier, tracking) {
            event.stopPropagation();
            if (activeTab === 'favorites') {
                let favs = getFavs().filter(f => !(f.courier === courier && f.tracking === tracking));
                localStorage.setItem('m_fav', JSON.stringify(favs));
            } else {
                let recs = getRecs().filter(r => !(r.courier === courier && r.tracking === tracking));
                localStorage.setItem('m_rec', JSON.stringify(recs));
            }
            renderList();
            showToast("기록이 삭제되었습니다.");
            if (currentCourier === courier && currentTracking === tracking) updateFavIcon();
        }

        function renderList() {
            const container = document.getElementById('listContainer');
            const data = activeTab === 'favorites' ? getFavs() : getRecs();

            if (data.length === 0) {
                container.innerHTML = `<p class="text-[10px] text-slate-400 text-center py-6">저장된 내역이 없습니다.</p>`;
                return;
            }

            container.innerHTML = '';
            data.forEach(item => {
                const el = `
                    <div class="bg-slate-50 border border-slate-100 p-2.5 rounded-xl flex items-center justify-between cursor-pointer hover:bg-slate-100 transition-colors"
                         onclick="selectItem('${item.courier}', '${item.tracking}', '${item.memo || ''}')">
                        <div class="overflow-hidden flex-1">
                            <div class="flex items-center space-x-1.5">
                                <span class="text-[9px] font-bold bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded">${item.courierName}</span>
                                ${item.memo ? `<span class="text-[10px] text-slate-700 font-bold truncate max-w-[80px]">${item.memo}</span>` : ''}
                            </div>
                            <span class="text-[10px] text-slate-500 font-mono tracking-wide block mt-0.5">${item.tracking}</span>
                        </div>
                        <button onclick="deleteItem(event, '${item.courier}', '${item.tracking}')" class="touch-target w-7 h-7 flex items-center justify-center text-slate-400 hover:text-rose-500">
                            <i class="fa-solid fa-xmark text-xs"></i>
                        </button>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', el);
            });
        }

        function selectItem(courier, tracking, memo) {
            document.getElementById('courierSelect').value = courier;
            document.getElementById('trackingNumberInput').value = tracking;
            document.getElementById('memoInput').value = memo;
            performTracking(courier, tracking, memo);
        }

        function copyTrackingNumber() {
            if (!currentTracking) return;
            const temp = document.createElement("input");
            temp.value = currentTracking;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            showToast("송장 번호가 클립보드에 복사되었습니다!");
        }
    </script>
</body>
</html>
